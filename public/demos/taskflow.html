<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow · Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0c0c0c;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #262626;
    }
    nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #a3a3a3;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    nav a span { color: #f59e0b; }
    nav h1 { font-size: 1.25rem; font-weight: 700; }
    .container {
      flex: 1;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
    }
    .add-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .add-row input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #f5f5f5;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-row input:focus { border-color: #f59e0b; }
    .add-row button, .clear-btn {
      background: #f59e0b;
      color: #0c0c0c;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .add-row button:hover, .clear-btn:hover { opacity: 0.85; }
    .clear-btn {
      background: transparent;
      border: 1px solid #262626;
      color: #a3a3a3;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }
    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .stats span { font-size: 0.85rem; color: #a3a3a3; }
    .task-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .task {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      transition: border-color 0.2s, opacity 0.3s;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .task:hover { border-color: #f59e0b33; }
    .task.done { opacity: 0.5; }
    .task.done .task-text { text-decoration: line-through; }
    .task input[type="checkbox"] {
      appearance: none;
      width: 18px; height: 18px;
      border: 2px solid #262626;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .task input[type="checkbox"]:checked {
      background: #f59e0b;
      border-color: #f59e0b;
    }
    .task-text { flex: 1; font-size: 0.9rem; }
    .task .delete {
      background: none;
      border: none;
      color: #a3a3a3;
      cursor: pointer;
      font-size: 1.1rem;
      transition: color 0.2s;
    }
    .task .delete:hover { color: #ef4444; }
    .empty {
      text-align: center;
      color: #a3a3a3;
      padding: 3rem 0;
      font-style: italic;
    }
    footer {
      text-align: center;
      padding: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #a3a3a3;
      border-top: 1px solid #262626;
    }
  </style>
</head>
<body>
  <nav>
    <h1>📋 TaskFlow</h1>
    <a href="/"><span>//</span> back to portfolio</a>
  </nav>
  <div class="container">
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." autofocus>
      <button id="addBtn">Add Task</button>
    </div>
    <div class="stats">
      <span id="counter">0 / 0 tasks done</span>
      <button class="clear-btn" id="clearBtn">Clear completed</button>
    </div>
    <div class="task-list" id="taskList">
      <div class="empty">No tasks yet. Add one above!</div>
    </div>
  </div>
  <footer>demo · khalil yahyaoui</footer>
  <script>
    const STORAGE_KEY = 'taskflow_demo';
    let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const taskList = document.getElementById('taskList');
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const counter = document.getElementById('counter');
    const clearBtn = document.getElementById('clearBtn');
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); render(); }
    function render() {
      const done = tasks.filter(t => t.done).length;
      counter.textContent = `${done} / ${tasks.length} tasks done`;
      if (tasks.length === 0) {
        taskList.innerHTML = '<div class="empty">No tasks yet. Add one above!</div>';
        return;
      }
      taskList.innerHTML = tasks.map((t, i) => `
        <div class="task ${t.done ? 'done' : ''}" data-index="${i}">
          <input type="checkbox" ${t.done ? 'checked' : ''}>
          <span class="task-text">${escapeHtml(t.text)}</span>
          <button class="delete" data-index="${i}">✕</button>
        </div>
      `).join('');
    }
    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      taskInput.value = '';
      save();
    }
    taskList.addEventListener('click', e => {
      const idx = e.target.closest('[data-index]')?.dataset?.index;
      if (idx === undefined) return;
      if (e.target.type === 'checkbox') { tasks[idx].done = !tasks[idx].done; save(); }
      if (e.target.classList.contains('delete')) { tasks.splice(idx, 1); save(); }
    });
    clearBtn.addEventListener('click', () => { tasks = tasks.filter(t => !t.done); save(); });
    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    render();
  </script>
</body>
</html>
