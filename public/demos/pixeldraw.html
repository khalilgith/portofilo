<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelDraw · Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #fff9f0;
      color: #2d2a24;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 2rem;
      background: #fff;
      border-bottom: 2px solid #f0e6d3;
    }
    nav a {
      font-size: 0.8rem;
      color: #b8a88a;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    nav a:hover { color: #2d2a24; }
    .container {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #2d2a24;
    }
    .header p { color: #b8a88a; font-size: 0.85rem; font-weight: 600; }
    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
      background: #fff;
      padding: 0.75rem 1rem;
      border-radius: 16px;
      border: 2px solid #f0e6d3;
      width: 100%;
    }
    .controls input[type="color"] {
      width: 36px; height: 36px;
      border: 2px solid #f0e6d3;
      border-radius: 10px;
      cursor: pointer;
      background: none;
      padding: 2px;
    }
    .controls input[type="range"] {
      width: 80px;
      accent-color: #2d2a24;
    }
    .controls button {
      background: #2d2a24;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.45rem 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.8rem;
      font-family: 'Nunito', sans-serif;
    }
    .controls button:hover { transform: scale(1.05); }
    .controls button:active { transform: scale(0.95); }
    .controls .secondary {
      background: #f0e6d3;
      color: #2d2a24;
    }
    .grid-wrapper {
      background: #fff;
      padding: 12px;
      border-radius: 20px;
      border: 2px solid #f0e6d3;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 2px;
      width: 100%;
      max-width: 400px;
    }
    .pixel {
      aspect-ratio: 1;
      background: #faf5ed;
      cursor: crosshair;
      border-radius: 2px;
      transition: transform 0.05s;
    }
    .pixel:hover { transform: scale(1.15); z-index: 1; }
    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.7rem;
      color: #b8a88a;
      font-weight: 600;
      border-top: 2px solid #f0e6d3;
    }
  </style>
</head>
<body>
  <nav>
    <span style="font-weight: 800; color: #2d2a24;">🎨 PixelDraw</span>
    <a href="/">← back to portfolio</a>
  </nav>
  <div class="container">
    <div class="header">
      <h1>Pixel art</h1>
      <p>Click &amp; drag to draw</p>
    </div>
    <div class="controls">
      <input type="color" id="colorPicker" value="#e85d3a">
      <input type="range" id="sizePicker" min="1" max="4" value="1">
      <span style="font-size:0.75rem; color:#b8a88a; font-weight:600;">size</span>
      <button id="fillBtn" class="secondary">Fill</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>
    <div class="grid-wrapper">
      <div class="grid-container" id="grid"></div>
    </div>
  </div>
  <footer>demo project · khalil yahyaoui</footer>
  <script>
    const SIZE = 20;
    const grid = document.getElementById('grid');
    const colorPicker = document.getElementById('colorPicker');
    const sizePicker = document.getElementById('sizePicker');
    const clearBtn = document.getElementById('clearBtn');
    const fillBtn = document.getElementById('fillBtn');
    let isDrawing = false;
    let pixels = [];
    function initGrid() {
      for (let i = 0; i < SIZE * SIZE; i++) {
        const div = document.createElement('div');
        div.className = 'pixel';
        div.dataset.index = i;
        grid.appendChild(div);
        pixels.push(div);
      }
    }
    function drawPixel(index, color) {
      const size = parseInt(sizePicker.value);
      const row = Math.floor(index / SIZE);
      const col = index % SIZE;
      for (let dr = -size + 1; dr < size; dr++) {
        for (let dc = -size + 1; dc < size; dc++) {
          const r = row + dr, c = col + dc;
          if (r >= 0 && r < SIZE && c >= 0 && c < SIZE) {
            pixels[r * SIZE + c].style.background = color;
          }
        }
      }
    }
    grid.addEventListener('mousedown', e => {
      const pixel = e.target.closest('.pixel');
      if (!pixel) return;
      isDrawing = true;
      drawPixel(parseInt(pixel.dataset.index), colorPicker.value);
    });
    grid.addEventListener('mousemove', e => {
      if (!isDrawing) return;
      const pixel = e.target.closest('.pixel');
      if (!pixel) return;
      drawPixel(parseInt(pixel.dataset.index), colorPicker.value);
    });
    document.addEventListener('mouseup', () => { isDrawing = false; });
    grid.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('pixel')) drawPixel(parseInt(el.dataset.index), colorPicker.value);
    }, { passive: false });
    clearBtn.addEventListener('click', () => pixels.forEach(p => p.style.background = '#faf5ed'));
    fillBtn.addEventListener('click', () => pixels.forEach(p => p.style.background = colorPicker.value));
    initGrid();
  </script>
</body>
</html>
