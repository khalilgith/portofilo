<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelDraw · Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0c0c0c;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #262626;
    }
    nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #a3a3a3;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    nav a span { color: #f59e0b; }
    nav h1 { font-size: 1.25rem; font-weight: 700; }
    .container {
      flex: 1;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls label { font-size: 0.85rem; color: #a3a3a3; }
    .controls input[type="color"] {
      width: 40px; height: 40px;
      border: 2px solid #262626;
      border-radius: 8px;
      cursor: pointer;
      background: none;
      padding: 2px;
    }
    .controls input[type="range"] { width: 100px; accent-color: #f59e0b; }
    .controls button {
      background: #f59e0b;
      color: #0c0c0c;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      font-size: 0.85rem;
    }
    .controls button:hover { opacity: 0.85; }
    .controls .clear-btn { background: #1a1a1a; border: 1px solid #262626; color: #a3a3a3; }
    .controls .clear-btn:hover { border-color: #ef4444; color: #ef4444; }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 1px;
      background: #262626;
      border: 2px solid #262626;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
      max-width: 420px;
    }
    .pixel {
      aspect-ratio: 1;
      background: #141414;
      cursor: crosshair;
      transition: background 0.05s;
    }
    .pixel:hover { opacity: 0.8; }
    .info { color: #a3a3a3; font-size: 0.8rem; margin-top: 1rem; text-align: center; }
    footer {
      text-align: center;
      padding: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #a3a3a3;
      border-top: 1px solid #262626;
    }
  </style>
</head>
<body>
  <nav>
    <h1>🎨 PixelDraw</h1>
    <a href="/"><span>//</span> back to portfolio</a>
  </nav>
  <div class="container">
    <div class="controls">
      <label>🎨</label>
      <input type="color" id="colorPicker" value="#f59e0b">
      <label>Size</label>
      <input type="range" id="sizePicker" min="1" max="5" value="1">
      <button id="fillBtn">Fill</button>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>
    <div class="grid-container" id="grid"></div>
    <p class="info">Click and drag to draw on the 20×20 pixel canvas</p>
  </div>
  <footer>demo · khalil yahyaoui</footer>
  <script>
    const SIZE = 20;
    const grid = document.getElementById('grid');
    const colorPicker = document.getElementById('colorPicker');
    const sizePicker = document.getElementById('sizePicker');
    const clearBtn = document.getElementById('clearBtn');
    const fillBtn = document.getElementById('fillBtn');
    let isDrawing = false;
    let pixels = [];
    function initGrid() {
      grid.innerHTML = '';
      for (let i = 0; i < SIZE * SIZE; i++) {
        const div = document.createElement('div');
        div.className = 'pixel';
        div.dataset.index = i;
        grid.appendChild(div);
        pixels.push(div);
      }
    }
    function drawPixel(index, color) {
      const size = parseInt(sizePicker.value);
      const row = Math.floor(index / SIZE);
      const col = index % SIZE;
      for (let dr = -size + 1; dr < size; dr++) {
        for (let dc = -size + 1; dc < size; dc++) {
          const r = row + dr, c = col + dc;
          if (r >= 0 && r < SIZE && c >= 0 && c < SIZE) {
            pixels[r * SIZE + c].style.background = color;
          }
        }
      }
    }
    grid.addEventListener('mousedown', e => {
      const pixel = e.target.closest('.pixel');
      if (!pixel) return;
      isDrawing = true;
      drawPixel(parseInt(pixel.dataset.index), colorPicker.value);
    });
    grid.addEventListener('mousemove', e => {
      if (!isDrawing) return;
      const pixel = e.target.closest('.pixel');
      if (!pixel) return;
      drawPixel(parseInt(pixel.dataset.index), colorPicker.value);
    });
    document.addEventListener('mouseup', () => { isDrawing = false; });
    grid.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('pixel')) {
        drawPixel(parseInt(el.dataset.index), colorPicker.value);
      }
    }, { passive: false });
    clearBtn.addEventListener('click', () => {
      pixels.forEach(p => p.style.background = '#141414');
    });
    fillBtn.addEventListener('click', () => {
      pixels.forEach(p => p.style.background = colorPicker.value);
    });
    initGrid();
  </script>
</body>
</html>
