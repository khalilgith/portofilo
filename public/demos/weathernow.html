<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherNow · Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    nav a {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }
    .container {
      flex: 1;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
    }
    .search-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .search-row input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 0.8rem 1.2rem;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: all 0.3s;
      font-size: 0.9rem;
    }
    .search-row input:focus { border-color: rgba(100, 200, 255, 0.4); background: rgba(255,255,255,0.08); }
    .search-row input::placeholder { color: rgba(255,255,255,0.3); }
    .search-row button {
      background: rgba(100, 200, 255, 0.15);
      border: 1px solid rgba(100, 200, 255, 0.2);
      color: #64c8ff;
      border-radius: 16px;
      padding: 0.8rem 1.5rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif;
    }
    .search-row button:hover { background: rgba(100, 200, 255, 0.25); }
    .current {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .current::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(100, 200, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .current .city { font-size: 1.2rem; font-weight: 400; color: rgba(255,255,255,0.6); margin-bottom: 0.25rem; }
    .current .temp { font-size: 4.5rem; font-weight: 300; line-height: 1; margin: 0.25rem 0; letter-spacing: -2px; }
    .current .desc { color: rgba(255,255,255,0.6); font-size: 1rem; margin-bottom: 1rem; }
    .current .details {
      display: flex; justify-content: center; gap: 2.5rem; color: rgba(255,255,255,0.5); font-size: 0.85rem;
    }
    .forecast-title { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .forecast { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
    .forecast-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1rem 0.5rem;
      text-align: center;
      transition: all 0.3s;
    }
    .forecast-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(100, 200, 255, 0.15); }
    .forecast-card .day { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-bottom: 0.35rem; font-weight: 500; }
    .forecast-card .icon { font-size: 1.5rem; margin-bottom: 0.35rem; }
    .forecast-card .high { font-weight: 500; font-size: 0.9rem; }
    .forecast-card .low { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
    .error { text-align: center; margin-bottom: 1rem; font-size: 0.85rem; }
    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.25);
      border-top: 1px solid rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <nav>
    <span style="font-weight: 500; letter-spacing: 0.02em;">🌤️ WeatherNow</span>
    <a href="/">← back to portfolio</a>
  </nav>
  <div class="container">
    <div class="search-row">
      <input type="text" id="cityInput" placeholder="Search city..." value="Sfax" autofocus>
      <button id="searchBtn">Search</button>
    </div>
    <div id="error" class="error"></div>
    <div class="current" id="currentWeather">
      <div class="city" id="cityName">--</div>
      <div class="temp" id="temp">--°</div>
      <div class="desc" id="desc">--</div>
      <div class="details">
        <span>💧 <span id="humidity">--</span>%</span>
        <span>💨 <span id="wind">--</span> km/h</span>
      </div>
    </div>
    <div class="forecast-title">5-day forecast</div>
    <div class="forecast" id="forecast"></div>
  </div>
  <footer>demo project · khalil yahyaoui</footer>
  <script>
    const cache = {};
    async function fetchWeather(city) {
      if (cache[city]) return cache[city];
      const coords = { 'london': [51.5, -0.12], 'paris': [48.85, 2.35], 'tokyo': [35.68, 139.69], 'new york': [40.71, -74.01], 'dubai': [25.20, 55.27], 'sfax': [34.74, 10.76], 'tunis': [36.80, 10.18], 'berlin': [52.52, 13.41], 'rome': [41.90, 12.50], 'madrid': [40.42, -3.70], 'moscow': [55.76, 37.62], 'beijing': [39.90, 116.40], 'sydney': [-33.87, 151.21], 'cairo': [30.04, 31.24], 'casablanca': [33.58, -7.58], 'algiers': [36.75, 3.04], 'lagos': [6.45, 3.39], 'nairobi': [-1.29, 36.82], 'cape town': [-33.92, 18.42], 'mumbai': [19.08, 72.88], 'singapore': [1.35, 103.82], 'seoul': [37.57, 126.98], 'bangkok': [13.75, 100.50], 'istanbul': [41.01, 28.98], 'amsterdam': [52.37, 4.89], 'los angeles': [34.05, -118.24], 'chicago': [41.87, -87.62], 'toronto': [43.65, -79.38] };
      const key = city.toLowerCase().trim();
      if (!coords[key]) throw new Error('City not found. Try London, Tokyo, Paris, Sfax...');
      const [lat, lon] = coords[key];
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
      const res = await fetch(url);
      const d = await res.json();
      const codeToDesc = { 0:'Clear', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast', 45:'Fog', 48:'Depositing rime fog', 51:'Light drizzle', 53:'Moderate drizzle', 55:'Dense drizzle', 61:'Slight rain', 63:'Moderate rain', 65:'Heavy rain', 71:'Slight snow', 73:'Moderate snow', 75:'Heavy snow', 80:'Slight rain showers', 81:'Moderate rain showers', 82:'Violent rain showers', 95:'Thunderstorm', 96:'Thunderstorm with slight hail', 99:'Thunderstorm with heavy hail' };
      const codeToEmoji = { 0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'❄️',80:'🌦️',95:'⛈️' };
      const wc = d.current.weather_code;
      const result = {
        city: city.charAt(0).toUpperCase() + city.slice(1),
        temp: Math.round(d.current.temperature_2m),
        feels: Math.round(d.current.apparent_temperature),
        desc: codeToDesc[wc] || 'Unknown',
        icon: codeToEmoji[wc] || '🌤️',
        humidity: d.current.relative_humidity_2m,
        wind: Math.round(d.current.wind_speed_10m),
        forecast: d.daily.time.map((t, i) => ({
          day: new Date(t).toLocaleDateString('en', { weekday: 'short' }),
          icon: codeToEmoji[d.daily.weather_code[i]] || '🌤️',
          high: Math.round(d.daily.temperature_2m_max[i]),
          low: Math.round(d.daily.temperature_2m_min[i]),
        }))
      };
      cache[city] = result;
      return result;
    }
    async function updateWeather(city) {
      const errorEl = document.getElementById('error');
      try {
        errorEl.textContent = '';
        const w = await fetchWeather(city);
        document.getElementById('cityName').textContent = w.city;
        document.getElementById('temp').textContent = `${w.temp}°C`;
        document.getElementById('desc').textContent = `${w.icon} ${w.desc}`;
        document.getElementById('humidity').textContent = w.humidity;
        document.getElementById('wind').textContent = w.wind;
        document.getElementById('forecast').innerHTML = w.forecast.map(f => `
          <div class="forecast-card">
            <div class="day">${f.day}</div>
            <div class="icon">${f.icon}</div>
            <div class="high">${f.high}°</div>
            <div class="low">${f.low}°</div>
          </div>
        `).join('');
      } catch (e) {
        errorEl.textContent = e.message;
      }
    }
    document.getElementById('searchBtn').addEventListener('click', () => {
      const city = document.getElementById('cityInput').value.trim();
      if (city) updateWeather(city);
    });
    document.getElementById('cityInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });
    updateWeather('Sfax');
  </script>
</body>
</html>
