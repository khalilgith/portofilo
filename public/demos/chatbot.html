<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBot · Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0c0c0c;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #262626;
    }
    nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #a3a3a3;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    nav a span { color: #f59e0b; }
    nav h1 { font-size: 1.25rem; font-weight: 700; }
    .container {
      flex: 1;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem 0;
      min-height: 400px;
    }
    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .bot { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
    .user { background: #f59e0b; color: #0c0c0c; align-self: flex-end; border-bottom-right-radius: 4px; }
    .input-row {
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid #262626;
      padding-top: 1rem;
    }
    .input-row input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #f5f5f5;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #f59e0b; }
    .input-row button {
      background: #f59e0b;
      color: #0c0c0c;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .input-row button:hover { opacity: 0.85; }
    .typing { color: #a3a3a3; font-size: 0.85rem; font-style: italic; align-self: flex-start; }
    footer {
      text-align: center;
      padding: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #a3a3a3;
      border-top: 1px solid #262626;
    }
  </style>
</head>
<body>
  <nav>
    <h1>🤖 ChatBot</h1>
    <a href="/"><span>//</span> back to portfolio</a>
  </nav>
  <div class="container">
    <div class="chat-box" id="chatBox">
      <div class="message bot">Hi! I'm a demo chatbot. Try asking me about the weather, my name, or just say hello!</div>
    </div>
    <div class="input-row">
      <input type="text" id="input" placeholder="Type a message..." autofocus>
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <footer>demo · khalil yahyaoui</footer>
  <script>
    const responses = {
      'hello': 'Hey there! How can I help you today?',
      'hi': 'Hey there! How can I help you today?',
      'hey': 'Hey there! How can I help you today?',
      'weather': 'The weather is always sunny in the world of demo apps! ☀️',
      'name': "I'm ChatBot, your friendly demo assistant!",
      'who are you': "I'm a simple rule-based chatbot built with vanilla JS. No AI here, just good old if/else!",
      'how are you': "I'm doing great! Thanks for asking. How about you?",
      'bye': 'Goodbye! Come back anytime.',
      'goodbye': 'Goodbye! Come back anytime.',
      'thanks': "You're welcome! 😊",
      'thank you': "You're welcome! 😊",
      'default': "That's interesting! Tell me more, or try asking about the weather, my name, or just say hello."
    };
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    function getResponse(msg) {
      const lower = msg.toLowerCase().trim();
      for (const [key, val] of Object.entries(responses)) {
        if (lower.includes(key)) return val;
      }
      return responses['default'];
    }
    function handleSend() {
      const msg = input.value.trim();
      if (!msg) return;
      addMessage(msg, 'user');
      input.value = '';
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.textContent = 'Bot is typing...';
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
      setTimeout(() => {
        typing.remove();
        addMessage(getResponse(msg), 'bot');
      }, 600 + Math.random() * 400);
    }
    sendBtn.addEventListener('click', handleSend);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
  </script>
</body>
</html>
