<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBot · Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    nav a {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }
    .container {
      flex: 1;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 0.25rem; }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1rem 0;
      min-height: 360px;
    }
    .message {
      max-width: 78%;
      padding: 0.75rem 1rem;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .bot {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .user {
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .input-row {
      display: flex;
      gap: 0.5rem;
      padding-top: 1rem;
      margin-top: 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .input-row input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.85rem 1.2rem;
      color: #fff;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
    }
    .input-row input:focus { border-color: rgba(167,139,250,0.5); background: rgba(255,255,255,0.08); }
    .input-row input::placeholder { color: rgba(255,255,255,0.3); }
    .input-row button {
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 1.5rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .input-row button:hover { opacity: 0.9; transform: scale(1.02); }
    .input-row button:active { transform: scale(0.98); }
    .typing {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      font-style: italic;
      align-self: flex-start;
      padding-left: 0.5rem;
    }
    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
      margin-right: 0.5rem;
      flex-shrink: 0;
    }
    .bot .msg-header { display: flex; align-items: center; margin-bottom: 0.35rem; }
    .bot .msg-header span { font-size: 0.7rem; color: rgba(255,255,255,0.5); font-weight: 500; }
  </style>
</head>
<body>
  <nav>
    <span style="font-weight: 600; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🤖 ChatBot</span>
    <a href="/">← back to portfolio</a>
  </nav>
  <div class="container">
    <div class="header">
      <h1>ChatBot</h1>
      <p>Ask me anything — I'm listening</p>
    </div>
    <div class="chat-box" id="chatBox">
      <div class="message bot">
        <div class="msg-header"><span class="avatar">B</span><span>Bot</span></div>
        Hey there! Try asking about the weather, my name, or just say hello.
      </div>
    </div>
    <div class="input-row">
      <input type="text" id="input" placeholder="Type a message..." autofocus>
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <footer>demo project · khalil yahyaoui</footer>
  <script>
    const responses = {
      'hello': 'Hey there! How can I help you today? ✨',
      'hi': 'Hey there! How can I help you today? ✨',
      'hey': 'Hey there! How can I help you today? ✨',
      'weather': 'The weather is always sunny in the world of demo apps! ☀️',
      'name': "I'm ChatBot, your friendly demo assistant! 🤖",
      'who are you': "I'm a rule-based chatbot built with vanilla JS — no AI, just good old if/else logic!",
      'how are you': "Feeling electric! ⚡ How about you?",
      'bye': 'Goodbye! Come back anytime. 👋',
      'goodbye': 'Goodbye! Come back anytime. 👋',
      'thanks': "You're welcome! 😊",
      'thank you': "You're welcome! 😊",
      'default': "That's interesting! Tell me more, or try: hello, weather, name, who are you, bye."
    };
    const chatBox = document.getElementById('chatBox');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    function addMessage(text, sender) {
      if (sender === 'bot') {
        const div = document.createElement('div');
        div.className = 'message bot';
        div.innerHTML = `<div class="msg-header"><span class="avatar">B</span><span>Bot</span></div>${escapeHtml(text)}`;
        chatBox.appendChild(div);
      } else {
        const div = document.createElement('div');
        div.className = 'message user';
        div.textContent = text;
        chatBox.appendChild(div);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    function escapeHtml(s) {
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }
    function getResponse(msg) {
      const lower = msg.toLowerCase().trim();
      for (const [key, val] of Object.entries(responses)) {
        if (lower.includes(key)) return val;
      }
      return responses['default'];
    }
    function handleSend() {
      const msg = input.value.trim();
      if (!msg) return;
      addMessage(msg, 'user');
      input.value = '';
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.textContent = 'Bot is typing...';
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
      setTimeout(() => {
        typing.remove();
        addMessage(getResponse(msg), 'bot');
      }, 500 + Math.random() * 400);
    }
    sendBtn.addEventListener('click', handleSend);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
  </script>
</body>
</html>
